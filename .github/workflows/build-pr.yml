name: Build Extension (PR)

on:
    pull_request:

jobs:
    lint:
        name: Build Extension
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Build Extension
              run: bun run build
